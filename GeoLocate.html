<!DOCTYPE html>
<html>
<head>
  <title>Working Map + Address</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 500px; }
  </style>
</head>
<body>

<h2>Your Location + Address</h2>
<button onclick="getLocation()">Show My Location</button>
<p id="address">Address: (waiting...)</p>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let marker;

function getLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (position) => {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    // Init map once
    if (!map) {
      map = L.map('map').setView([lat, lon], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
    } else {
      map.setView([lat, lon], 15);
    }

    // Update marker
    if (marker) {
      marker.setLatLng([lat, lon]);
    } else {
      marker = L.marker([lat, lon]).addTo(map);
    }

    marker.bindPopup("You are here").openPopup();

    // Reverse geocoding (FIXED)
    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`,
        {
          headers: {
            "User-Agent": "MyGeolocationApp/1.0 (your@email.com)"
          }
        }
      );

      if (!response.ok) throw new Error("HTTP error");

      const data = await response.json();

      document.getElementById("address").innerHTML =
        "Address: " + (data.display_name || "Not found");

    } catch (err) {
      document.getElementById("address").innerHTML =
        "Address lookup failed (API blocked or rate limited)";
      console.error(err);
    }

  }, (err) => {
    alert("Location error: " + err.message);
  });
}
</script>

</body>
</html>
