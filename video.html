<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  #myVideo {
    display: none; /* Hidden until clicked */
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>

<div id="overlay">Click the Screen</div>

<video id="myVideo">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("myVideo");
  const overlay = document.getElementById("overlay");

  overlay.addEventListener("click", () => {
    overlay.style.display = "none";   // Hide message
    video.style.display = "block";    // Show video
    video.play();                     // Play with sound
  });
</script>

</body>
</html>
